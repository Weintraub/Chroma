<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chroma</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Cinzel:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/start.css">
<link rel="stylesheet" href="css/game.css">
<link rel="stylesheet" href="css/results.css">
</head>
<body>
<div id="app">

  <div class="screen" id="start-screen">
    <div class="wordmark">CHROMA</div>
    <div class="tagline">discover your colour instinct</div>

    <div class="config-section">
      <div class="config-label">Rounds</div>
      <div class="option-row">
        <button class="opt-btn" data-rounds="15">15</button>
        <button class="opt-btn active" data-rounds="25">25</button>
        <button class="opt-btn" data-rounds="40">40</button>
        <button class="opt-btn" data-rounds="0">endless</button>
      </div>
    </div>

    <div class="config-section">
      <div class="config-label">Mode</div>
      <div class="mode-row">
        <button class="mode-card active" data-mode="favourite">
          <span class="mode-title">Find Your Favourite Colour</span>
          <span class="mode-desc">A structured sweep of the spectrum, narrowing toward your precise shade</span>
        </button>
        <button class="mode-card" data-mode="aesthetic">
          <span class="mode-title">Find Your Aesthetic</span>
          <span class="mode-desc">An adaptive exploration that maps the full shape of your taste</span>
        </button>
      </div>
    </div>

    <button class="begin-btn" id="begin-btn">BEGIN</button>
    <div class="version-tag">v1.3</div>
  </div>

  <div class="screen hidden" id="game-screen">
    <div class="split-container" id="split">
      <div class="swatch" id="swatch-left"></div>
      <div class="swatch" id="swatch-right"></div>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
    <div class="round-counter" id="round-counter"></div>
    <button class="stop-btn hidden" id="stop-btn">STOP</button>
  </div>

  <div class="screen hidden" id="results-screen">
    <div class="results-inner">
      <div class="results-wordmark">CHROMA — YOUR RESULTS</div>
      <div class="archetype-name" id="archetype-name"></div>
      <div class="archetype-desc" id="archetype-desc"></div>

      <div class="section-label">Your Palette</div>
      <div class="palette-row" id="palette-row"></div>

      <div class="hsl-bars" style="margin-top:2.5rem;">
        <div class="section-label">Colour Profile</div>
        <div class="hsl-row">
          <div class="hsl-axis-label">HUE</div>
          <div class="hsl-track"><div class="hsl-thumb" id="thumb-h"></div></div>
          <div class="hsl-value" id="val-h"></div>
        </div>
        <div class="hsl-row">
          <div class="hsl-axis-label">SAT</div>
          <div class="hsl-track"><div class="hsl-thumb" id="thumb-s"></div></div>
          <div class="hsl-value" id="val-s"></div>
        </div>
        <div class="hsl-row">
          <div class="hsl-axis-label">LIGHT</div>
          <div class="hsl-track"><div class="hsl-thumb" id="thumb-l"></div></div>
          <div class="hsl-value" id="val-l"></div>
        </div>
      </div>

      <button class="play-again-btn" id="play-again-btn">PLAY AGAIN</button>
    </div>
  </div>

  <div class="flash-overlay" id="flash"></div>
</div>

<script src="js/data.js"></script>
<script src="js/engine.js"></script>
<script src="js/app.js"></script>
<script src="js/start.js"></script>
<script src="js/game.js"></script>
<script src="js/results.js"></script>
</body>
</html>
