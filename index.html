<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chroma</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Cinzel:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0d0d0d;
    color: #e8e4dc;
    font-family: 'Cormorant Garamond', serif;
    min-height: 100vh;
    overflow: hidden;
  }

  #app {
    width: 100vw;
    height: 100vh;
    position: relative;
  }

  .screen {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: opacity 0.6s ease;
  }
  .screen.hidden { opacity: 0; pointer-events: none; }

  #start-screen {
    gap: 0;
    padding: 3rem;
  }

  .wordmark {
    font-family: 'Cinzel', serif;
    font-size: clamp(3rem, 8vw, 6rem);
    font-weight: 400;
    letter-spacing: 0.25em;
    color: #e8e4dc;
    margin-bottom: 0.35em;
  }

  .tagline {
    font-size: clamp(0.95rem, 2vw, 1.2rem);
    font-style: italic;
    color: #aaa;
    letter-spacing: 0.08em;
    margin-bottom: 4rem;
  }

  .config-section {
    width: 100%;
    max-width: 520px;
    margin-bottom: 2.5rem;
  }

  .config-label {
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    letter-spacing: 0.3em;
    color: #888;
    text-transform: uppercase;
    margin-bottom: 1rem;
  }

  .option-row {
    display: flex;
    gap: 0;
    border: 0.5px solid #2a2a2a;
  }

  .opt-btn {
    flex: 1;
    background: transparent;
    border: none;
    border-right: 0.5px solid #2a2a2a;
    color: #888;
    font-family: 'Cormorant Garamond', serif;
    font-size: 1rem;
    padding: 0.75rem 0.5rem;
    cursor: pointer;
    transition: all 0.2s ease;
    letter-spacing: 0.04em;
  }
  .opt-btn:last-child { border-right: none; }
  .opt-btn:hover { color: #aaa; background: #161616; }
  .opt-btn.active {
    color: #e8e4dc;
    background: #1c1c1c;
  }

  .mode-row {
    display: flex;
    gap: 12px;
  }

  .mode-card {
    flex: 1;
    background: transparent;
    border: 0.5px solid #2a2a2a;
    color: #888;
    font-family: 'Cormorant Garamond', serif;
    cursor: pointer;
    padding: 1.25rem 1rem;
    text-align: left;
    transition: all 0.25s ease;
  }
  .mode-card:hover { border-color: #444; background: #111; }
  .mode-card.active { border-color: #666; background: #161616; color: #e8e4dc; }

  .mode-title {
    font-family: 'Cinzel', serif;
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    margin-bottom: 0.5rem;
    display: block;
  }
  .mode-card.active .mode-title { color: #e8e4dc; }
  .mode-card:not(.active) .mode-title { color: #777; }

  .mode-desc {
    font-size: 0.88rem;
    font-style: italic;
    line-height: 1.5;
    color: inherit;
  }

  .begin-btn {
    margin-top: 1rem;
    background: transparent;
    border: 0.5px solid #666;
    color: #aaa;
    font-family: 'Cinzel', serif;
    font-size: 0.75rem;
    letter-spacing: 0.35em;
    padding: 1rem 3.5rem;
    cursor: pointer;
    transition: all 0.3s ease;
  }
  .begin-btn:hover:not(:disabled) { border-color: #aaa; color: #e8e4dc; }
  .begin-btn:disabled { opacity: 0.25; cursor: not-allowed; }

  #game-screen { padding: 0; }

  .split-container {
    width: 100%;
    height: 100vh;
    display: flex;
    gap: 3px;
    background: #111;
    cursor: pointer;
  }

  .swatch {
    flex: 1;
    transition: flex 0.15s ease;
    position: relative;
  }
  .swatch:hover { flex: 1.04; }

  .progress-bar {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: rgba(255,255,255,0.08);
    z-index: 10;
  }
  .progress-fill {
    height: 100%;
    background: rgba(255,255,255,0.35);
    transition: width 0.4s ease;
  }

  .round-counter {
    position: absolute;
    bottom: 2rem;
    width: 100%;
    text-align: center;
    font-family: 'Cinzel', serif;
    font-size: 0.6rem;
    letter-spacing: 0.3em;
    color: rgba(255,255,255,0.55);
    pointer-events: none;
    z-index: 10;
  }

  .stop-btn {
    position: absolute;
    top: 1.25rem;
    right: 1.5rem;
    background: transparent;
    border: 0.5px solid rgba(255,255,255,0.25);
    color: rgba(255,255,255,0.5);
    font-family: 'Cinzel', serif;
    font-size: 0.6rem;
    letter-spacing: 0.3em;
    padding: 0.5rem 1.1rem;
    cursor: pointer;
    transition: all 0.25s ease;
    z-index: 20;
  }
  .stop-btn:hover { border-color: rgba(255,255,255,0.35); color: rgba(255,255,255,0.6); }

  .flash-overlay {
    position: fixed;
    inset: 0;
    background: #111;
    opacity: 0;
    pointer-events: none;
    z-index: 100;
    transition: opacity 0.15s ease;
  }
  .flash-overlay.active { opacity: 1; }

  #results-screen {
    padding: 3rem;
    overflow-y: auto;
    justify-content: flex-start;
    padding-top: 5vh;
  }

  .results-inner {
    width: 100%;
    max-width: 600px;
    margin: 0 auto;
  }

  .results-wordmark {
    font-family: 'Cinzel', serif;
    font-size: 0.7rem;
    letter-spacing: 0.35em;
    color: #777;
    margin-bottom: 3rem;
  }

  .archetype-name {
    font-family: 'Cinzel', serif;
    font-size: clamp(1.6rem, 4vw, 2.8rem);
    font-weight: 500;
    letter-spacing: 0.15em;
    line-height: 1.2;
    color: #e8e4dc;
    margin-bottom: 0.5rem;
  }

  .archetype-desc {
    font-size: 1rem;
    font-style: italic;
    color: #999;
    margin-bottom: 3rem;
    line-height: 1.6;
  }

  .section-label {
    font-family: 'Cinzel', serif;
    font-size: 0.58rem;
    letter-spacing: 0.3em;
    color: #777;
    margin-bottom: 1rem;
    text-transform: uppercase;
  }

  .palette-row {
    display: flex;
    gap: 6px;
    margin-bottom: 3rem;
  }

  .palette-swatch {
    flex: 1;
    border-radius: 2px;
    position: relative;
    cursor: default;
  }
  .palette-swatch::after {
    content: attr(data-hex);
    position: absolute;
    bottom: -1.6rem;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.65rem;
    font-family: 'Cinzel', serif;
    letter-spacing: 0.05em;
    color: #777;
    white-space: nowrap;
  }

  .hsl-bars {
    margin-bottom: 3.5rem;
  }

  .hsl-row {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 1rem;
  }

  .hsl-axis-label {
    font-family: 'Cinzel', serif;
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    color: #777;
    width: 1.8rem;
    flex-shrink: 0;
  }

  .hsl-track {
    flex: 1;
    height: 4px;
    background: #1e1e1e;
    position: relative;
    border-radius: 2px;
  }

  .hsl-thumb {
    position: absolute;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #e8e4dc;
  }

  .hsl-value {
    font-size: 0.85rem;
    color: #999;
    width: 3.5rem;
    text-align: right;
    font-style: italic;
  }

  .play-again-btn {
    background: transparent;
    border: 0.5px solid #2a2a2a;
    color: #777;
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    letter-spacing: 0.3em;
    padding: 0.85rem 2.5rem;
    cursor: pointer;
    transition: all 0.3s ease;
    margin-top: 1rem;
  }
  .play-again-btn:hover { border-color: #888; color: #ccc; }

  .version-tag {
    position: absolute;
    bottom: 1.25rem;
    right: 1.5rem;
    font-family: 'Cinzel', serif;
    font-size: 0.55rem;
    letter-spacing: 0.2em;
    color: #555;
  }
</style>
</head>
<body>
<div id="app">

  <div class="screen" id="start-screen">
    <div class="wordmark">CHROMA</div>
    <div class="tagline">discover your colour instinct</div>

    <div class="config-section">
      <div class="config-label">Rounds</div>
      <div class="option-row">
        <button class="opt-btn" data-rounds="15">15</button>
        <button class="opt-btn active" data-rounds="25">25</button>
        <button class="opt-btn" data-rounds="40">40</button>
        <button class="opt-btn" data-rounds="0">endless</button>
      </div>
    </div>

    <div class="config-section">
      <div class="config-label">Mode</div>
      <div class="mode-row">
        <button class="mode-card active" data-mode="favourite">
          <span class="mode-title">Find Your Favourite Colour</span>
          <span class="mode-desc">A structured sweep of the spectrum, narrowing toward your precise shade</span>
        </button>
        <button class="mode-card" data-mode="aesthetic">
          <span class="mode-title">Find Your Aesthetic</span>
          <span class="mode-desc">An adaptive exploration that maps the full shape of your taste</span>
        </button>
      </div>
    </div>

    <button class="begin-btn" id="begin-btn">BEGIN</button>
    <div class="version-tag">v1.2</div>
  </div>

  <div class="screen hidden" id="game-screen">
    <div class="split-container" id="split">
      <div class="swatch" id="swatch-left"></div>
      <div class="swatch" id="swatch-right"></div>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
    <div class="round-counter" id="round-counter"></div>
    <button class="stop-btn hidden" id="stop-btn">STOP</button>
  </div>

  <div class="screen hidden" id="results-screen">
    <div class="results-inner">
      <div class="results-wordmark">CHROMA — YOUR RESULTS</div>
      <div class="archetype-name" id="archetype-name"></div>
      <div class="archetype-desc" id="archetype-desc"></div>

      <div class="section-label">Your Palette</div>
      <div class="palette-row" id="palette-row"></div>

      <div class="hsl-bars" style="margin-top:2.5rem;">
        <div class="section-label">Colour Profile</div>
        <div class="hsl-row">
          <div class="hsl-axis-label">HUE</div>
          <div class="hsl-track"><div class="hsl-thumb" id="thumb-h"></div></div>
          <div class="hsl-value" id="val-h"></div>
        </div>
        <div class="hsl-row">
          <div class="hsl-axis-label">SAT</div>
          <div class="hsl-track"><div class="hsl-thumb" id="thumb-s"></div></div>
          <div class="hsl-value" id="val-s"></div>
        </div>
        <div class="hsl-row">
          <div class="hsl-axis-label">LIGHT</div>
          <div class="hsl-track"><div class="hsl-thumb" id="thumb-l"></div></div>
          <div class="hsl-value" id="val-l"></div>
        </div>
      </div>

      <button class="play-again-btn" id="play-again-btn">PLAY AGAIN</button>
    </div>
  </div>

  <div class="flash-overlay" id="flash"></div>
</div>

<script>
const ARCHETYPES = [
  { name: "OCEANIC DEPTH",    desc: "You're drawn to the cool quiet of deep water — blues and teals that feel like looking up from below the surface.",  h: [170,240], s: [40,100], l: [25,55] },
  { name: "DUSTY TERRACOTTA", desc: "Warm earth, sun-bleached clay. Your palette lives in the comfortable space between rust and sand.",                  h: [10,40],   s: [30,70],  l: [35,65] },
  { name: "SOFT LINEN",       desc: "Quiet, considered, barely there. You favour tones that feel like first light through undyed cloth.",                 h: [25,60],   s: [5,30],   l: [70,90] },
  { name: "NEON MODERNIST",   desc: "High saturation, no apology. You trust colour to do the heavy lifting.",                                            h: [0,360],   s: [80,100], l: [45,65] },
  { name: "MOODY DUSK",       desc: "The hour when colours lose their certainty. Deep purples, slated mauves, bruised blues.",                           h: [240,300], s: [20,60],  l: [15,45] },
  { name: "FOREST FLOOR",     desc: "Mossy, dark, grounded. Greens that feel wet rather than bright.",                                                   h: [90,160],  s: [25,65],  l: [20,50] },
  { name: "GOLDEN HOUR",      desc: "Every amber, honey, and warm ochre that exists in the fifteen minutes before sunset.",                              h: [30,55],   s: [60,100], l: [45,70] },
  { name: "PALE NORDIC",      desc: "Desaturated, cool-leaning, effortlessly composed. The palette of concrete and fog.",                                h: [190,250], s: [5,30],   l: [60,85] },
  { name: "VERDANT",          desc: "Not the green of logos — the green of things that grow. Sage, fern, celadon.",                                      h: [90,150],  s: [20,55],  l: [45,75] },
  { name: "DEEP LACQUER",     desc: "Saturated darks — burgundy, ink, oxblood. Colours that feel lacquered rather than painted.",                        h: [330,30],  s: [50,90],  l: [12,35] },
  { name: "MINERAL GREY",     desc: "Precise, architectural neutrals. You find richness in the spaces between colours.",                                  h: [0,360],   s: [0,15],   l: [20,70] },
  { name: "ROSE DUSK",        desc: "Blush, dusty pinks and warm mauves — romantic but never saccharine.",                                               h: [320,360], s: [20,65],  l: [50,80] },
];

function hslToHex(h, s, l) {
  s /= 100; l /= 100;
  const a = s * Math.min(l, 1 - l);
  const f = n => {
    const k = (n + h / 30) % 12;
    const c = l - a * Math.max(-1, Math.min(k - 3, 9 - k, 1));
    return Math.round(255 * c).toString(16).padStart(2, '0');
  };
  return '#' + f(0) + f(8) + f(4);
}

function matchArchetype(h, s, l) {
  for (const a of ARCHETYPES) {
    const hMatch = a.h[0] <= a.h[1]
      ? (h >= a.h[0] && h <= a.h[1])
      : (h >= a.h[0] || h <= a.h[1]);
    const sMatch = s >= a.s[0] && s <= a.s[1];
    const lMatch = l >= a.l[0] && l <= a.l[1];
    if (hMatch && sMatch && lMatch) return a;
  }
  return ARCHETYPES[Math.floor(Math.random() * ARCHETYPES.length)];
}

let config = { rounds: 25, mode: 'favourite' };
let state = {};

function initState() {
  state = { round: 0, maxRounds: config.rounds, mode: config.mode, colors: [], left: null, right: null, results: null };

  if (config.mode === 'favourite') {
    const hues = [0, 60, 120, 180, 240, 300];
    const sats = [25, 55, 85];
    const lights = [30, 50, 70];
    for (const h of hues) for (const s of sats) for (const l of lights)
      state.colors.push({ h, s, l, elo: 1000, wins: 0, seen: 0 });
  } else {
    const hues = Array.from({ length: 12 }, (_, i) => i * 30);
    const sats = [15, 35, 55, 75, 95];
    const lights = [25, 40, 55, 70];
    for (const h of hues) for (const s of sats) for (const l of lights)
      state.colors.push({ h, s, l, elo: 1000, wins: 0, seen: 0 });
  }
}

function pickPair() {
  const c = state.colors;
  const progress = state.round / Math.max(state.maxRounds, 1);

  if (state.mode === 'favourite') {
    if (progress < 0.4) {
      const unseen = c.filter(x => x.seen === 0);
      const pool = unseen.length >= 2 ? unseen : c;
      const a = pool[Math.floor(Math.random() * pool.length)];
      let b; do { b = pool[Math.floor(Math.random() * pool.length)]; } while (b === a);
      return [a, b];
    } else {
      const sorted = [...c].sort((a, b) => b.elo - a.elo);
      const pool = sorted.slice(0, Math.max(Math.floor(sorted.length * 0.5), 8));
      const a = pool[Math.floor(Math.random() * pool.length)];
      let b; do { b = pool[Math.floor(Math.random() * pool.length)]; } while (b === a);
      return [a, b];
    }
  } else {
    const sorted = [...c].sort((a, b) => b.elo - a.elo);
    const pool = Math.random() < 0.3 ? c : sorted.slice(0, Math.max(Math.floor(sorted.length * 0.4), 10));
    const a = pool[Math.floor(Math.random() * pool.length)];
    let b; do { b = pool[Math.floor(Math.random() * pool.length)]; } while (b === a);
    return [a, b];
  }
}

function eloUpdate(winner, loser) {
  const K = 32;
  const expW = 1 / (1 + Math.pow(10, (loser.elo - winner.elo) / 400));
  winner.elo += K * (1 - expW);
  loser.elo  += K * (0 - (1 - expW));
  winner.wins++;
  winner.seen++;
  loser.seen++;
}

function computeResults() {
  const sorted = [...state.colors].sort((a, b) => b.elo - a.elo);
  const top5 = sorted.slice(0, 5);
  const totalElo = top5.reduce((s, c) => s + c.elo, 0);
  let avgH_x = 0, avgH_y = 0, avgS = 0, avgL = 0;
  for (const c of top5) {
    const w = c.elo / totalElo;
    avgH_x += w * Math.cos(c.h * Math.PI / 180);
    avgH_y += w * Math.sin(c.h * Math.PI / 180);
    avgS += w * c.s;
    avgL += w * c.l;
  }
  const avgH = ((Math.atan2(avgH_y, avgH_x) * 180 / Math.PI) + 360) % 360;
  state.results = { top5, avgH: Math.round(avgH), avgS: Math.round(avgS), avgL: Math.round(avgL), archetype: matchArchetype(Math.round(avgH), Math.round(avgS), Math.round(avgL)) };
}

function hueLabel(h) {
  const names = [[15,'Red'],[45,'Orange'],[75,'Yellow'],[105,'Chartreuse'],[135,'Green'],[165,'Teal'],[195,'Cyan'],[225,'Azure'],[255,'Blue'],[285,'Violet'],[315,'Magenta'],[345,'Rose'],[361,'Red']];
  for (const [max, name] of names) if (h < max) return name;
  return 'Red';
}
function satLabel(s)   { return s < 20 ? 'Muted' : s < 50 ? 'Soft' : s < 75 ? 'Rich' : 'Vivid'; }
function lightLabel(l) { return l < 30 ? 'Dark'  : l < 50 ? 'Deep' : l < 65 ? 'Mid'  : 'Light'; }

const startScreen   = document.getElementById('start-screen');
const gameScreen    = document.getElementById('game-screen');
const resultsScreen = document.getElementById('results-screen');
const flash         = document.getElementById('flash');

document.querySelectorAll('[data-rounds]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-rounds]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    config.rounds = parseInt(btn.dataset.rounds);
  });
});

document.querySelectorAll('[data-mode]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-mode]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    config.mode = btn.dataset.mode;
  });
});

document.getElementById('begin-btn').addEventListener('click', startGame);
document.getElementById('play-again-btn').addEventListener('click', () => showScreen('start'));
document.getElementById('stop-btn').addEventListener('click', endGame);

function showScreen(name) {
  startScreen.classList.toggle('hidden', name !== 'start');
  gameScreen.classList.toggle('hidden', name !== 'game');
  resultsScreen.classList.toggle('hidden', name !== 'results');
}

function startGame() {
  initState();
  showScreen('game');
  document.getElementById('stop-btn').classList.toggle('hidden', config.rounds !== 0);
  nextRound();
}

function nextRound() {
  if (state.maxRounds > 0 && state.round >= state.maxRounds) { endGame(); return; }
  const [a, b] = pickPair();
  state.left = a; state.right = b;
  document.getElementById('swatch-left').style.background  = `hsl(${a.h},${a.s}%,${a.l}%)`;
  document.getElementById('swatch-right').style.background = `hsl(${b.h},${b.s}%,${b.l}%)`;
  const pct = state.maxRounds > 0 ? (state.round / state.maxRounds) * 100 : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('round-counter').textContent = state.maxRounds > 0 ? `${state.round + 1} / ${state.maxRounds}` : `Round ${state.round + 1}`;
}

function choose(winner, loser) {
  eloUpdate(winner, loser);
  state.round++;
  flash.classList.add('active');
  setTimeout(() => { flash.classList.remove('active'); nextRound(); }, 120);
}

document.getElementById('swatch-left').addEventListener('click',  () => choose(state.left, state.right));
document.getElementById('swatch-right').addEventListener('click', () => choose(state.right, state.left));

document.addEventListener('keydown', e => {
  if (!gameScreen.classList.contains('hidden')) {
    if (e.key === 'ArrowLeft')  choose(state.left, state.right);
    if (e.key === 'ArrowRight') choose(state.right, state.left);
  }
});

function endGame() {
  computeResults();
  renderResults();
  showScreen('results');
}

function renderResults() {
  const r = state.results;
  document.getElementById('archetype-name').textContent = r.archetype.name;
  document.getElementById('archetype-desc').textContent = r.archetype.desc;

  const row = document.getElementById('palette-row');
  row.innerHTML = '';
  r.top5.forEach(c => {
    const hex = hslToHex(c.h, c.s, c.l);
    const div = document.createElement('div');
    div.className = 'palette-swatch';
    div.style.cssText = `background: hsl(${c.h},${c.s}%,${c.l}%); height: 80px;`;
    div.setAttribute('data-hex', hex.toUpperCase());
    row.appendChild(div);
  });

  document.getElementById('thumb-h').style.left = (r.avgH / 360 * 100) + '%';
  document.getElementById('thumb-s').style.left = r.avgS + '%';
  document.getElementById('thumb-l').style.left = r.avgL + '%';
  document.getElementById('val-h').textContent = hueLabel(r.avgH);
  document.getElementById('val-s').textContent = satLabel(r.avgS);
  document.getElementById('val-l').textContent = lightLabel(r.avgL);
}
</script>
</body>
</html>
